baseURL = 'https://msoucy.me/'
languageCode = 'en-us'
title = 'msoucy.me'
theme = ['msoucy', 'reveal-hugo']
enableGitInfo = true
enableRobotsTXT = true

[params]
  author = 'Matt Soucy'
  fb = "1188604437"
  subtitle = "Code, games, and sarcasm"

[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

[social]
  bsky = 'msoucy.gay'
  mastodon = 'fedi.msoucy.me/@matt'

[outputFormats.Reveal]
  baseName = "index"
  mediaType = "text/html"
  isHTML = true

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

